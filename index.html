<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerala Fat Loss Diet Plan Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Kerala Diet Plan Creator</h1>
            <p>Generate your personalized fat-loss meal plan.</p>
        </header>
        <main>
            <div id="form-section" class="card fade-in">
                <form id="diet-form">
                    <div class="form-group row">
                        <div class="col">
                            <label for="age">Age</label>
                            <input type="number" id="age" name="age" required min="15" max="100" placeholder="e.g. 25">
                        </div>
                        <div class="col">
                            <label for="gender">Gender</label>
                            <select id="gender" name="gender" required>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group row">
                        <div class="col">
                            <label for="weight">Weight (kg)</label>
                            <input type="number" id="weight" name="weight" required min="30" max="250" placeholder="e.g. 70">
                        </div>
                        <div class="col">
                            <label for="height">Height (cm)</label>
                            <input type="number" id="height" name="height" required min="100" max="250" placeholder="e.g. 170">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="activity">Activity Level</label>
                        <select id="activity" name="activity" required>
                            <option value="1.2">Sedentary (little or no exercise)</option>
                            <option value="1.375">Lightly active (light exercise 1-3 days/week)</option>
                            <option value="1.55">Moderately active (moderate exercise 3-5 days/week)</option>
                            <option value="1.725">Very active (hard exercise 6-7 days/week)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="preference">Food Preference</label>
                        <select id="preference" name="preference" required>
                            <option value="non-veg">Non-Vegetarian</option>
                            <option value="veg">Vegetarian</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="goal">Goal Speed</label>
                        <select id="goal" name="goal" required>
                            <option value="300">Slow & Steady (-300 kcal/day)</option>
                            <option value="500" selected>Moderate (-500 kcal/day)</option>
                            <option value="700">Fast (-700 kcal/day)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Generate Diet Plan</button>
                </form>
            </div>
            <div id="result-section" class="card hidden">
                <div class="summary-box">
                    <div class="summary-item">
                        <h3>Target Calories</h3>
                        <p id="target-calories">0 kcal</p>
                    </div>
                    <div class="summary-item">
                        <h3>Daily Water</h3>
                        <p id="water-intake">0 L</p>
                    </div>
                </div>
                <h2>Your 7-Day Kerala Meal Plan</h2>
                <div id="meal-plan-container" class="meal-plan-container">
                    <!-- Plan will be injected here -->
                </div>
                <button id="generate-again" class="btn-secondary">Generate Another Plan</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
